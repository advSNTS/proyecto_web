apiVersion: apps/v1
kind: Deployment
metadata:
  name: proyecto-web
  namespace: mi-ns      # namespace asignado por el profe. TODO
spec:
  replicas: 2
  selector:
    matchLabels:
      app: proyecto-web
  template:
    metadata:
      labels:
        app: proyecto-web
    spec:
      imagePullSecrets:
      - name: ghcr-secret   # el profe crea este secret con tu token
      containers:
      - name: proyecto-web
        image: ghcr.io/TU_USUARIO_GITHUB/TU_REPO:latest
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: proyecto-web
  namespace: mi-ns
spec:
  selector:
    app: proyecto-web
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: proyecto-web
  namespace: mi-ns
spec:
  ingressClassName: public
  rules:
  - host: TUGRUPO.inphotech.co
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: proyecto-web
            port:
              number: 8080