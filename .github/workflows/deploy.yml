name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build and Analyze with SonarQube
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          DB_HOST: ${{secrets.DB_HOST}}
          DB_NAME: ${{secrets.DB_NAME}}
          DB_PASSWORD: ${{secrets.DB_PASSWORD}}
          DB_PORT: ${{secrets.DB_PORT}}
          DB_USER: ${{secrets.DB_USER}}
        run: mvn -B clean verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -Dsonar.projectKey=proyecto-web -Dsonar.projectName='proyecto-web'

      - name: Login a GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Construir y subir imagen Docker
        env:
          IMAGE: ghcr.io/${{ github.repository }}
        run: |
          IMAGE_LOWER=$(echo "$IMAGE" | tr '[:upper:]' '[:lower:]')
          docker build -t ${IMAGE_LOWER}:latest .
          docker push ${IMAGE_LOWER}:latest
  deploy-onpremise:
    name: Deploy on MicroK8s On-Premise
    runs-on: main
    needs: build-and-deploy

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Debug MicroK8s
        run: |
          sudo microk8s status
          sudo microk8s kubectl get nodes
          sudo microk8s kubectl get pods -A

      - name: Apply Kubernetes deployment
        run: sudo microk8s kubectl apply -f k8s/deployment.yaml --validate=false

      - name: Restart Kubernetes deployment
        run: sudo microk8s kubectl rollout restart deployment/proyecto-web -n grupo11

      - name: Esperar rollout
        run: sudo microk8s kubectl rollout status deployment/proyecto-web -n grupo11

      - name: Ver estado de pods
        run: sudo microk8s kubectl get pods -n grupo11 -o wide

      - name: Logs pods
        run: |
          for pod in $(sudo microk8s kubectl get pods -n grupo11 -o jsonpath='{.items[*].metadata.name}'); do
            echo "---- LOGS $pod ----"
            sudo microk8s kubectl logs $pod -n grupo11
          done